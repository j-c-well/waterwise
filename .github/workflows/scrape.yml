name: Scrape WaterScope

on:
  schedule:
    - cron: '0 8 * * *'   # 2am MT (UTC-6 MDT)
  workflow_dispatch:       # allow manual trigger
    inputs:
      trigger:
        description: 'Trigger source (scheduled | manual | registration)'
        required: false
        default: 'manual'

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        env:
          WATERSCOPE_EMAIL: ${{ secrets.WATERSCOPE_EMAIL }}
          WATERSCOPE_PASSWORD: ${{ secrets.WATERSCOPE_PASSWORD }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRIGGER: ${{ github.event.inputs.trigger || 'scheduled' }}
        run: node scripts/scrape.js

      - name: Run corrections
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: node scripts/corrections.js
